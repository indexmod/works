<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Works</title>

<style>
body {
    margin: 0;
    padding: 20mm;
    font-family: Helvetica, Arial, sans-serif;
    font-size: 16px;
    color: #000;
    background: #fff;
}

/* общий список */
.list {
    display: flex;
    flex-direction: column;
    gap: 18mm;
}

/* один блок работы */
.item {
    display: flex;
    justify-content: space-between;
    align-items: flex-end; /* ключ: всё по нижнему краю */
    gap: 12mm;
    page-break-inside: avoid;
}

/* левая колонка */
.text {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

/* правая колонка (картинка) */
.image {
    width: 80mm;
    flex-shrink: 0;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
}

.image img {
    width: 100%;
    height: auto;
    display: block;
}

/* текст */
.title {
    font-size: 20px;
    margin-bottom: 6px;
}

.meta {
    font-size: 16px;
    margin-bottom: 6px;
}

.desc {
    font-size: 16px;
}

/* печать */
@media print {
    body {
        padding: 0;
    }
}
</style>
</head>

<body>

<div class="list" id="list"></div>

<script src="app.js"></script>

</body>
</html>
