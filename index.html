---
layout: none
---

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Works</title>
<link rel="stylesheet" href="styles.css">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='black'/%3E%3Ccircle cx='11' cy='13' r='2' fill='white'/%3E%3Ccircle cx='21' cy='13' r='2' fill='white'/%3E%3Crect x='12' y='20' width='8' height='2' rx='1' fill='white'/%3E%3C/svg%3E">
</head>

<body>

<div class="list">

{% for work in site.works %}

<div class="item">

  <div class="text">
    <div class="text-inner">
      <div class="title">{{ work.title }}</div>
      <div class="meta">{{ work.year }}</div>
      <div class="meta">{{ work.size }}</div>
      <div class="meta">{{ work.materials }}</div>
    </div>
  </div>

  {% if work.detail_image %}
  <div class="detail-image">
    <img src="images/{{ work.detail_image }}.png?v={{ site.time | date: '%s' }}" alt="">
  </div>
  {% endif %}

  <div class="image">
    <img src="images/{{ work.image }}.png?v={{ site.time | date: '%s' }}" alt="">
  </div>

</div>

{% endfor %}

</div>

</body>
</html>
