---
layout: none
---

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Works</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="list">

{% for work in site.works %}

<div class="item">

  <div class="text">
    <div class="title">{{ work.title }}</div>
    <div class="meta">{{ work.year }}</div>
    <div class="meta">{{ work.size }}</div>
    <div class="meta">{{ work.materials }}</div>
  </div>

  <div class="image">
    <img src="images/{{ work.image }}.jpg">
  </div>

</div>

{% endfor %}

</div>

</body>
</html>
