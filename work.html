<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>{{ page.title }}</title>

<style>
body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  font-size: 18px;
  color: #000;
  padding: 20mm;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 20mm;
}

.text {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.image img {
  width: 80mm;
  height: auto;
}
</style>
</head>

<body>

<div class="item">

  <div class="text">
    <div>{{ page.title }}</div>
    <div>{{ page.year }} · {{ page.size }}</div>
    <div>{{ page.materials }}</div>
    <div>{{ content }}</div>
  </div>

  <div class="image">
    <img src="/assets/images/{{ page.image }}.jpg">
  </div>

</div>

</body>
</html>
