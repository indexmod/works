layout: none
---

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Works Grid</title>

<style>
body {
  margin: 0;
  padding: 20mm;
  font-family: Helvetica, Arial, sans-serif;
  font-size: 16px;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 18mm;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1px solid #000;
  padding-bottom: 10mm;
}

.text {
  flex: 1;
}

.image img {
  width: 80mm;
}
</style>
</head>

<body>

<div class="list">

{% assign sorted = site.works | sort: "order" %}

{% for item in sorted %}
  {% include item.html item=item %}
{% endfor %}

</div>

</body>
</html>
